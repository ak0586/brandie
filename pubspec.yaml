name: brandie_smart_post
description: "Oriflame Smart Post - AI-powered social media post creator for beauty sales reps."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.2.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/post/
